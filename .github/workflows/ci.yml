name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy agent/ eval/ sandbox/ github_integration/

      - name: Test
        run: |
          pytest tests/ -v \
            --cov=agent \
            --cov=sandbox \
            --cov=eval \
            --cov=github_integration \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          # Tests use mocked Anthropic/Docker — no real keys needed
          ANTHROPIC_API_KEY: test-key-for-mocked-tests

      - name: Build sandbox Docker image
        run: docker build -t self-healing-agent-sandbox:latest ./sandbox/
